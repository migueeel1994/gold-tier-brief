<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Tier Brief Builder — Betashares</title>
<style>
/* ── Rund font family (brand kit v1.0.0) ──────────────────── */
@font-face { font-family: "Rund Display"; src: url("../fonts/RundDisplay-Medium.woff2") format("woff2"); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: "Rund Text"; src: url("../fonts/RundText-Light.woff2") format("woff2"); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: "Rund Text"; src: url("../fonts/RundText-Medium.woff2") format("woff2"); font-weight: 500; font-style: normal; font-display: swap; }

:root {
  --bs-orange:    #FA4D16;
  --bs-orange-dk: #E04210;
  --bs-orange-lt: #FFF1EC;
  --bs-black:     #202021;
  --bs-grey-1:    #545454;
  --bs-grey-2:    #7F7F7F;
  --bs-grey-3:    #A9A9A9;
  --bs-grey-4:    #D4D4D4;
  --bs-offwhite:  #F0EDEB;
  --bs-white:     #FFFFFF;
  --bs-font-display: "Rund Display", system-ui, Arial, sans-serif;
  --bs-font-text:    "Rund Text", system-ui, Arial, sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family: var(--bs-font-text);
  font-weight: 300;
  background: var(--bs-offwhite);
  color: var(--bs-black);
  display:flex;flex-direction:column;height:100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ─────────────────────────────────────────────── */
#header{
  background: var(--bs-white);
  border-bottom: 3px solid var(--bs-orange);
  padding: 14px 24px;
  display: flex; align-items: center; gap: 16px;
  flex-shrink: 0;
}
.logo-mark { width: 30px; height: 30px; flex-shrink: 0; }
#header-text h1 {
  font-family: var(--bs-font-display);
  font-size: 15px; font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--bs-black);
}
#header-text p {
  font-family: var(--bs-font-text);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bs-grey-2);
  margin-top: 2px;
}
#progress-wrap { flex: 1; max-width: 360px; }
#progress-label {
  font-family: var(--bs-font-text);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--bs-grey-2);
  margin-bottom: 5px;
  display: flex; justify-content: space-between;
}
#progress-label .step-name { color: var(--bs-orange); }
#progress-track { background: var(--bs-offwhite); height: 4px; border-radius: 2px; overflow: hidden; }
#progress-fill { background: var(--bs-orange); height: 100%; width: 0; transition: width .5s ease; border-radius: 2px; }
#restart-btn {
  font-family: var(--bs-font-text);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bs-grey-2);
  background: none;
  border: 1px solid var(--bs-grey-4);
  border-radius: 4px;
  padding: 6px 14px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
}
#restart-btn:hover { color: var(--bs-orange); border-color: var(--bs-orange); }

/* ── Chat ───────────────────────────────────────────────── */
#chat {
  flex: 1; overflow-y: auto;
  padding: 24px;
  display: flex; flex-direction: column; gap: 10px;
}

/* Section divider */
.divider { display: flex; align-items: center; gap: 10px; margin: 8px 0 4px; }
.divider-line { flex: 1; height: 1px; background: var(--bs-grey-4); }
.divider-label {
  font-family: var(--bs-font-text);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--bs-orange);
  white-space: nowrap;
}

/* Bot bubble */
.bot-row { display: flex; align-items: flex-start; gap: 10px; max-width: 78%; }
.bot-avatar {
  width: 28px; height: 28px;
  flex-shrink: 0;
  margin-top: 2px;
  display: block;
}
.bot-bubble {
  background: var(--bs-white);
  border: 1px solid var(--bs-grey-4);
  border-radius: 0 12px 12px 12px;
  padding: 12px 16px;
  font-size: 13.5px; line-height: 1.6;
  color: var(--bs-black);
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.bot-bubble strong { color: var(--bs-orange); font-weight: 500; }
.bot-bubble em { font-style: italic; font-weight: 400; }
.bot-bubble.warn { border-color: var(--bs-orange); background: var(--bs-orange-lt); }
.bot-bubble.confirm { border-color: var(--bs-orange); background: var(--bs-white); border-left: 3px solid var(--bs-orange); border-radius: 0 12px 12px 12px; }

/* Validation actions */
.v-actions { display: flex; gap: 8px; margin-top: 12px; }
.v-btn {
  font-family: var(--bs-font-text);
  font-size: 12px; font-weight: 500;
  border-radius: 6px;
  padding: 7px 16px;
  cursor: pointer;
  transition: all .15s;
}
.v-btn.revise { background: var(--bs-orange); color: var(--bs-white); border: none; }
.v-btn.revise:hover { background: var(--bs-orange-dk); }
.v-btn.keep { background: var(--bs-white); color: var(--bs-grey-1); border: 1px solid var(--bs-grey-4); }
.v-btn.keep:hover { border-color: var(--bs-black); color: var(--bs-black); }

/* Typing dots */
.typing-dots { display: flex; gap: 4px; padding: 4px 2px; }
.dot { width: 6px; height: 6px; background: var(--bs-grey-3); border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* User bubble */
.user-row { display: flex; justify-content: flex-end; }
.user-bubble {
  background: var(--bs-orange);
  color: var(--bs-white);
  border-radius: 12px 12px 0 12px;
  padding: 10px 16px;
  font-size: 13.5px; line-height: 1.5;
  max-width: 70%;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── Input area ─────────────────────────────────────────── */
#input-area {
  background: var(--bs-white);
  border-top: 1px solid var(--bs-grey-4);
  padding: 16px 24px;
  flex-shrink: 0;
}
#input-wrap { display: flex; align-items: flex-end; gap: 10px; max-width: 880px; margin: 0 auto; }
#user-input {
  flex: 1;
  font-family: var(--bs-font-text);
  font-weight: 300;
  border: 1.5px solid var(--bs-grey-4);
  border-radius: 8px;
  padding: 11px 16px;
  font-size: 14px;
  resize: none;
  min-height: 46px; max-height: 160px;
  line-height: 1.5;
  color: var(--bs-black);
  background: var(--bs-white);
  transition: border-color .2s;
  overflow-y: auto;
}
#user-input:focus { outline: none; border-color: var(--bs-orange); }
#user-input::placeholder { color: var(--bs-grey-3); }
#send-btn {
  background: var(--bs-orange);
  color: var(--bs-white);
  border: none;
  border-radius: 8px;
  width: 46px; height: 46px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .2s;
}
#send-btn:hover { background: var(--bs-orange-dk); }
#send-btn:disabled { background: var(--bs-grey-3); cursor: not-allowed; }

/* Choices */
#choices-wrap { display: flex; gap: 8px; flex-wrap: wrap; max-width: 880px; margin: 0 auto; }
.choice {
  background: var(--bs-white);
  border: 1.5px solid var(--bs-orange);
  color: var(--bs-orange);
  border-radius: 22px;
  padding: 9px 22px;
  font-family: var(--bs-font-text);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.choice:hover { background: var(--bs-orange); color: var(--bs-white); }

/* Done button */
#done-btn {
  background: var(--bs-orange);
  color: var(--bs-white);
  border: none;
  border-radius: 8px;
  padding: 14px 28px;
  font-family: var(--bs-font-text);
  font-size: 14px; font-weight: 500;
  letter-spacing: 0.02em;
  cursor: pointer;
  width: 100%; max-width: 880px;
  display: block; margin: 0 auto;
  transition: background .2s;
}
#done-btn:hover { background: var(--bs-orange-dk); }

/* ── Brief overlay ──────────────────────────────────────── */
#overlay { position: fixed; inset: 0; background: rgba(32,32,33,.6); display: none; z-index: 100; overflow-y: auto; padding: 40px 20px; }
#overlay.on { display: block; }
#modal {
  background: var(--bs-white);
  max-width: 820px; margin: 0 auto;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
#modal-head {
  background: var(--bs-black);
  color: var(--bs-white);
  padding: 20px 28px;
  border-bottom: 4px solid var(--bs-orange);
  display: flex; align-items: center; justify-content: space-between;
}
#modal-head h2 {
  font-family: var(--bs-font-display);
  font-size: 18px; font-weight: 500;
  letter-spacing: -0.01em;
}
.mh-actions { display: flex; gap: 8px; }
.mh-btn {
  background: rgba(255,255,255,.15);
  border: none;
  color: var(--bs-white);
  border-radius: 6px;
  padding: 7px 14px;
  cursor: pointer;
  font-family: var(--bs-font-text);
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.04em;
  transition: background .15s;
}
.mh-btn:hover { background: rgba(255,255,255,.28); }

#brief-body { padding: 28px; font-size: 13px; line-height: 1.6; }
.bs { padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--bs-grey-4); }
.bs:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.bs-title {
  font-family: var(--bs-font-text);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--bs-orange);
  border-left: 3px solid var(--bs-orange);
  padding-left: 10px;
  margin-bottom: 12px;
}
.bf { margin-bottom: 12px; }
.bf-label {
  font-family: var(--bs-font-text);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bs-grey-2);
  margin-bottom: 3px;
}
.bf-val { white-space: pre-wrap; color: var(--bs-black); }
.hgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
#modal-foot {
  padding: 16px 28px;
  background: var(--bs-offwhite);
  border-top: 1px solid var(--bs-grey-4);
  display: flex; gap: 10px;
}
.f-btn {
  padding: 9px 20px;
  border-radius: 6px;
  font-family: var(--bs-font-text);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.f-btn.pri { background: var(--bs-orange); color: var(--bs-white); border: none; }
.f-btn.pri:hover { background: var(--bs-orange-dk); }
.f-btn.sec { background: var(--bs-white); color: var(--bs-black); border: 1px solid var(--bs-grey-4); }
.f-btn.sec:hover { border-color: var(--bs-black); }

/* ── Form-link footer (cross-link to static form) ───────── */
.form-link {
  font-family: var(--bs-font-text);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bs-grey-2);
  text-decoration: none;
  border-bottom: 1px solid var(--bs-grey-4);
  padding-bottom: 1px;
  transition: color .15s, border-color .15s;
}
.form-link:hover { color: var(--bs-orange); border-color: var(--bs-orange); }
</style>
</head>
<body>

<div id="header">
  <img class="logo-mark" src="../assets/logo-mark.svg" alt="Betashares">
  <div id="header-text">
    <h1>Gold Tier Brief Builder</h1>
    <p>Chatbot · New campaign thinking</p>
  </div>
  <div id="progress-wrap">
    <div id="progress-label">
      <span class="step-name" id="step-name">Getting started</span>
      <span id="pct">0%</span>
    </div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
  <a href="../" class="form-link" title="Switch to the form version">Form version →</a>
  <button id="restart-btn" onclick="restart()">Start over</button>
</div>

<div id="chat"></div>

<div id="input-area">
  <div id="input-wrap" style="display:none">
    <textarea id="user-input" rows="1" placeholder="Type your answer…"></textarea>
    <button id="send-btn" onclick="submit()" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div id="choices-wrap" style="display:none"></div>
  <button id="done-btn" style="display:none" onclick="showBrief()">View your completed brief →</button>
</div>

<div id="overlay">
  <div id="modal">
    <div id="modal-head">
      <h2>Gold Tier Marketing Brief</h2>
      <div class="mh-actions">
        <button class="mh-btn" id="copy-btn" onclick="copyBrief()">Copy text</button>
        <button class="mh-btn" id="handoff-btn" onclick="copyForHandoff()">Copy for AI review</button>
        <button class="mh-btn" onclick="closeOverlay()">Close</button>
      </div>
    </div>
    <div id="brief-body"></div>
    <div id="modal-foot">
      <button class="f-btn pri" onclick="copyBrief()">Copy to clipboard</button>
      <button class="f-btn sec" onclick="closeOverlay()">Back to chat</button>
    </div>
  </div>
</div>

<script src="../audit.js"></script>
<script>
/* ── Persona data — fills audience fields when picked ──── */
const PERSONAS = {
  isaac: {
    name: 'Isaac, the Frozen Starter',
    aud_demo: 'Early 20s to early 30s. Single or early partnership. Renter. Metro Australia. Moderate early-career income. Near-zero investable assets — 1 or 2 small ETF purchases at most.',
    aud_belief: 'Wants to start investing but feels like it belongs to someone else. Sees the share market as gambling-adjacent. Knows the words (ETF, DCA, compound interest) but has not used them. Self-deprecating. Fears irreversible mistakes and procrastinating his decades away.',
    aud_usage: 'Arrives via TikTok / Instagram creator content, Reddit (r/AusFinance, r/PassiveInvestingAustralia), Equity Mates and Diary of a CEO drop-offs, peer recommendation. Searches "how to start investing Australia", "best ETF for beginners Australia", "invest with $100". Downloaded but never funded: Sharesies, CommSec Pocket, Raiz.',
    aud_rel: 'Category non-user. Has heard of Betashares but treats brand brag stats (1M investors, $77B FUM) as a turn-off. Responds to peer voice, low/zero minimums stated without caveat, plain language, real starter stories. Has read Barefoot Investor.'
  },
  madeline: {
    name: 'Madeline, the Reluctant Participant',
    aud_demo: 'Late 20s to early 40s. Professional. Renter or recent first-home buyer. Metro Australia. Partnered or single, may have young kids. Stable professional salary, moderate disposable income. Modest but growing ETF holdings + super in a chosen fund.',
    aud_belief: 'Wants financial security without becoming "someone who invests" — rejects the investor identity for its class, moral and gendered weight. Wants low-maintenance, reassurance, ethical framing with substance. Fears being judged as naive, dabbling, or sold-to under the guise of education.',
    aud_usage: 'Arrives via She\'s on the Money / Equity Mates / Barefoot podcasts, peer recommendation (strongest channel), female-skewing finance content on paid social. Searches "best ETFs Australia", "how to invest without thinking about it", "ethical ETF Australia". Set up auto-contributions via CommSec Pocket / Sharesies / Raiz.',
    aud_rel: 'Light category user. Holds an ETF or two but doesn\'t actively engage with brand. Bounces from "investor" language, Wall Street imagery, wealthy-old-man framing. Responds to peer voice, ethical framing with proof, "grow your money with confidence".'
  },
  naomi: {
    name: 'Naomi, the Fragmented Strategist',
    aud_demo: 'Mid-40s to mid-50s. Partnered, home owner, pre-transition to retirement. Metro or regional Australia. Older kids possible. Solid professional or government salary, household income >$150k. Substantial assets across property, ETFs, managed funds and super — spread across 2 or more platforms.',
    aud_belief: 'High financial literacy, self-taught, never paid for advice. Wants ongoing income from investments, one single view of everything, one tax statement at EOFY. Fears fragmentation is hiding a gap she cannot see; saving too hard and missing life now; advice with hidden commercial motive; policy changes (CGT, super caps, franking).',
    aud_usage: 'Direct navigation (knows the brand). Searches specific queries: "Vanguard vs Betashares core ETF", "best Australian ETF 2026", "SMSF ETF strategy". Reads Morningstar, Intelligent Investor. Logs into multiple platforms; hasn\'t rebalanced in 12+ months. Tax time is painful — multiple AMMA statements.',
    aud_rel: 'Already holds Betashares ETFs alongside Vanguard equivalents on a different broker. Trusts Betashares as an issuer. Knows Direct exists but defaults to incumbent platform out of inertia. Bounces from hand-holding copy, generic "trusted by" claims, unnamed "team of experts".'
  },
  richard: {
    name: 'Richard, the Confident Self-Director',
    aud_demo: 'Late 40s to 60s. Established, significant assets. Metro Australia. Partnered, kids independent. High income — professional, healthcare, or business owner. Direct shares as core, ETFs as satellite, super structured deliberately (possibly SMSF or Member Direct).',
    aud_belief: 'Investing is genuinely interesting to him. Wants tax efficiency across the structure, income to sustain lifestyle without drawing down capital, intellectual engagement. Fears holding winners too long, hidden fees behind low-cost claims, being patronised. Zero tolerance for filler.',
    aud_usage: 'Direct navigation. Searches: "ASX200 ETF comparison", "best SMSF ETF for franking". Reads AFR, Morningstar, Bell Potter / Ord Minnett newsletters. Uses Sharesight or spreadsheets for portfolio tracking. Tried tip services in his 30s/40s (lost money, never again). Uses AI as a research assistant only.',
    aud_rel: 'Sophisticated category user across CommSec, NAB Trade, Bell Potter, CMC. Will compare Betashares to anything before moving. Bounces from beginner framing, hand-holding language, awards without context. Responds to performance data with context, named PMs with track records, total-cost-of-ownership transparency.'
  },
  dominique: {
    name: 'Dominique, the Pre-Retirement Consolidator',
    aud_demo: 'Mid-50s to early 60s. Working, planning to retire at 60. Metro or suburban Australia. Partnered, kids independent or leaving. Upper-moderate income, professional or administrative. Largest wealth often locked in property — plus ETFs, some direct shares, super, cash buffer.',
    aud_belief: 'Retire at 60, not 65 — this is the entire point. Wants enough to enjoy retirement actively, clear guidance on the 60-65 super-access bridge, tax-effective drawdown, consolidated view. Fears rule changes (CGT, super caps, franking), the crystal-ball problem, putting too much aside and missing life now, advice subtly product-driven.',
    aud_usage: 'Google: "retire at 60 Australia", "bridge the gap super access age", "tax effective drawdown strategy". Reads Money Mag, Fin Review. Direct navigation when she already knows the brand. Has compared super funds and read PDSs. Understands contribution caps.',
    aud_rel: 'Category user with multiple super funds and investment accounts. Loyalty to long-tenure incumbents. Bounces from beginner framing, "innovation" headlines, aspirational excess, claims without substance. Responds to specific retirement dates, named tax/super experts, scenario tools she can configure.'
  }
};

/* ── FLOW — ordered list of questions ────────────────────── */
const FLOW = [
  {type:'msg', text:"Hi — I'm your **Gold Tier Brief Builder**.\n\nI'll walk you through writing a brief from the marketer's side. Take your time — the brief is only as sharp as what you put in.\n\nLet's start with the project basics."},

  // ── Project Details ────────────────────────────────────
  {id:'project_name',  sec:'Project Details', step:0, type:'input',  key:'project_name',  q:"What's the **project name**?"},
  {id:'segment',       sec:'Project Details', step:0, type:'choice', key:'segment',       q:"Which **Betashares segment** is this for?", choices:['Direct','Super','ETFs','Brand','B2B','Content']},
  {id:'creative_lead', sec:'Project Details', step:0, type:'input',  key:'creative_lead', q:"Who's the **creative lead**?"},
  {id:'approver',      sec:'Project Details', step:0, type:'input',  key:'approver',      q:"Who's the **brief approver**? Named person — not 'TBC'."},
  {id:'launch',        sec:'Project Details', step:0, type:'input',  key:'launch',        q:"What's the **target launch date**? A real date — not 'Q3' or 'ASAP'."},
  {id:'budget_media',  sec:'Project Details', step:0, type:'input',  key:'budget_media',  q:"What's the **media budget**? (e.g. $250,000)"},

  // ── Section 1 — Context ────────────────────────────────
  {type:'msg', text:"**Section 1 — Context**\n\nBefore objectives, I need to understand what's actually driving this brief."},
  {id:'reason',   sec:'Section 1 — Context', step:1, type:'textarea', key:'reason',
   q:"What's the **commercial trigger** for this brief?\n\nA target you're missing, a competitor move, a launch, a regulatory change, a customer behaviour shift. One paragraph. No generic ambition."},
  {id:'prob_opp', sec:'Section 1 — Context', step:1, type:'choice',   key:'prob_opp',
   q:"Is this brief addressing a **Problem** or an **Opportunity**? Pick one — not both.", choices:['Problem','Opportunity']},
  {id:'focus',    sec:'Section 1 — Context', step:1, type:'textarea', key:'focus',
   q:"In one sentence: what's the **single most important thing** marketing needs to fix or unlock?\n\nTemplate: *'The single thing that needs to change is ___ because ___.'*",
   validate: v => {
     const low = v.toLowerCase();
     if ((low.includes(' and ') || low.includes(' & ')) && v.length > 40)
       return "This looks like it might be covering more than one thing. A Gold Tier brief needs a single, clear focus — which one matters most?";
     return null;
   }},

  // ── Section 2 — Objectives ─────────────────────────────
  {type:'msg', text:"**Section 2 — Objectives**\n\nThree linked levels. Commercial first, then behavioural, then attitudinal. Each must trigger the one above it."},
  {id:'obj_metric',   sec:'Section 2 — Objectives', step:2, type:'input', key:'obj_metric',
   q:"**Commercial objective.** What's the **metric** you're moving?\n\ne.g. FUM, sign-ups, market share, revenue."},
  {id:'obj_baseline', sec:'Section 2 — Objectives', step:2, type:'input', key:'obj_baseline',
   q:"What's the **baseline** — where it is today?"},
  {id:'obj_target',   sec:'Section 2 — Objectives', step:2, type:'input', key:'obj_target',
   q:"What's the **target** — where it needs to get to?"},
  {id:'obj_deadline', sec:'Section 2 — Objectives', step:2, type:'input', key:'obj_deadline',
   q:"What's the **deadline**? Real date."},
  {id:'obj_beh',      sec:'Section 2 — Objectives', step:2, type:'textarea', key:'obj_beh',
   q:"**Behavioural objective.** What specifically do we need the audience to **DO** that they're not doing today?\n\nVerb-specific: open an account, switch from X, add to existing holding, refer."},
  {id:'obj_att_from', sec:'Section 2 — Objectives', step:2, type:'textarea', key:'obj_att_from',
   q:"**Attitudinal shift — FROM** what current belief or feeling?"},
  {id:'obj_att_to',   sec:'Section 2 — Objectives', step:2, type:'textarea', key:'obj_att_to',
   q:"**→ TO** what target belief or feeling?"},
  {id:'cascade',      sec:'Section 2 — Objectives', step:2, type:'cascade'},

  // ── Section 3 — Audience ───────────────────────────────
  {type:'msg', text:"**Section 3 — Audience**\n\nSharp enough to picture one person. 'Australians 25–55' fails."},
  {id:'persona', sec:'Section 3 — Audience', step:3, type:'choice', key:'persona',
   q:"Pick a **persona** (auto-fills the four audience dimensions) or define a new audience:",
   choices:['Isaac — frozen starter','Madeline — reluctant participant','Naomi — fragmented strategist','Richard — confident self-director','Dominique — pre-retirement consolidator','New audience']},
  // The 4 audience-dimension questions only fire if "New audience" is picked:
  {id:'aud_demo',   sec:'Section 3 — Audience', step:3, type:'textarea', key:'aud_demo',  conditional:'new',
   q:"**Demographics.** Age, gender, income, occupation, geography.",
   validate: v => {
     const low = v.toLowerCase();
     const broad = /australians? \d+|aged \d+[\-–]\d+|all (investors|australians|adults)/i;
     if (broad.test(v) && v.length < 80)
       return "That reads like a target market, not a target audience. Can you sharpen to one person — name, life stage, specific context?";
     return null;
   }},
  {id:'aud_belief', sec:'Section 3 — Audience', step:3, type:'textarea', key:'aud_belief', conditional:'new',
   q:"**What they believe about money, investing, the category.**\n\nWorldview, values, what they care about. Plain language."},
  {id:'aud_usage',  sec:'Section 3 — Audience', step:3, type:'textarea', key:'aud_usage',  conditional:'new',
   q:"**Usage.** How, why, where, when, and how often do they engage with the category or brand?"},
  {id:'aud_rel',    sec:'Section 3 — Audience', step:3, type:'textarea', key:'aud_rel',    conditional:'new',
   q:"**Relationship to brand and competitors.** Loyal, lapsed, competitor user, category non-user. Name competitors specifically."},

  // ── Section 4 — Insight + Message ──────────────────────
  {type:'msg', text:"**Section 4 — Insight + Message**\n\nThe hardest section. Insights reveal tensions — they aren't statistics."},
  {id:'insight', sec:'Section 4 — Insight + Message', step:4, type:'textarea', key:'insight',
   q:"What's the **insight**?\n\nWhat single belief or behaviour is blocking the commercial outcome? Give the evidence — research, sales data, customer feedback, behavioural pattern.",
   validate: v => {
     const starters = ['people ','australians ','consumers ','customers ','most people ','many people ','research shows','studies show','data shows'];
     const low = v.toLowerCase().trim();
     if (starters.some(s => low.startsWith(s)))
       return "This reads like an observation — describes what people do or think, but not the underlying tension.\n\nWhat does that belief make them do, or avoid doing, that they secretly wish was different? That's the insight.";
     return null;
   }},
  {id:'barrier', sec:'Section 4 — Insight + Message', step:4, type:'textarea', key:'barrier',
   q:"What's the **barrier** — why isn't this behaviour happening today?"},
  {id:'lever',   sec:'Section 4 — Insight + Message', step:4, type:'textarea', key:'lever',
   q:"What's the **lever** — what removes the barrier?"},
  {id:'nudge',   sec:'Section 4 — Insight + Message', step:4, type:'textarea', key:'nudge',
   q:"Which **behavioural principle** maps to that barrier?\n\nFraming, social proof, default effect, loss aversion, reciprocity, scarcity, source effect, anchoring. Pick one or two — don't list seven."},
  {id:'message', sec:'Section 4 — Insight + Message', step:4, type:'textarea', key:'message',
   q:"What's the **single-minded message**?\n\nOne sentence. Sets creative direction — don't write the line.",
   validate: v => {
     const fanboys = [' and ',' but ',' or ',' so ',' yet ',' nor '];
     const found = fanboys.find(f => (' '+v.toLowerCase()+' ').includes(f));
     const wc = v.trim().split(/\s+/).length;
     if (found) return `Your message contains "${found.trim()}" — it may be trying to say two things.\n\nA Gold Tier brief needs one direction. Can you cut it to the most important part?`;
     if (wc > 25)  return `That's ${wc} words. Over 25 erodes single-mindedness. Can you compress?`;
     return null;
   }},
  {id:'rtb1',    sec:'Section 4 — Insight + Message', step:4, type:'input', key:'rtb1',
   q:"**RTB #1.** Your strongest hard fact — numbers, structure, regulation.",
   validate: v => {
     const adjs = ['trusted','leading','innovative','best-in-class','world-class','premium'];
     const low = v.toLowerCase();
     if (adjs.some(a => low.includes(a)) && !v.match(/[0-9$%]/))
       return "That reads like an adjective claim, not a proofpoint. Can you replace it with a specific number, comparison, or customer-stated reason?";
     return null;
   }},
  {id:'rtb2',    sec:'Section 4 — Insight + Message', step:4, type:'input', key:'rtb2', optional:true,
   q:"**RTB #2.** Customer evidence — named cohort behaviour, testimonial data. *(Optional — type 'skip'.)*"},
  {id:'rtb3',    sec:'Section 4 — Insight + Message', step:4, type:'input', key:'rtb3', optional:true,
   q:"**RTB #3.** Brand claim if relevant — awards, scale (use sparingly). *(Optional — type 'skip'.)*"},

  // ── Section 5 — Creative Guidance ──────────────────────
  {type:'msg', text:"**Section 5 — Creative Guidance**\n\nSet the emotional territory. Don't prescribe the solution."},
  {id:'feel',  sec:'Section 5 — Creative Guidance', step:5, type:'textarea', key:'feel',
   q:"What **emotional state** should the work produce in the audience?\n\nNot aesthetic ('modern', 'premium') — emotional ('calm capability', 'recognition', 'permission to start')."},
  {id:'never', sec:'Section 5 — Creative Guidance', step:5, type:'textarea', key:'never',
   q:"What must the work **never do**?\n\nTones, claims, territories that are off-limits. Be specific — 'don't be boring' doesn't help."},
  {id:'inspo', sec:'Section 5 — Creative Guidance', step:5, type:'textarea', key:'inspo', optional:true,
   q:"Any **reference or inspiration**?\n\nMood, not prescription. *(Optional — type 'skip' to move on.)*"},

  // ── Section 6 — Deliverables ───────────────────────────
  {type:'msg', text:"**Section 6 — Deliverables**\n\nChannel by channel. Tick the lead asset."},
  {id:'deliverables', sec:'Section 6 — Deliverables', step:6, type:'textarea', key:'deliverables',
   q:"List **deliverables by channel** — format, length/size, mark the lead asset.\n\ne.g.\nTV: :30 hero + :15 cut (lead)\nOOH: 3x6m, D6\nSocial: 1:1 + 9:16, :15s\nLanding page"},

  // ── Section 7 — Considerations ─────────────────────────
  {id:'cons', sec:'Section 7 — Considerations', step:7, type:'textarea', key:'cons', optional:true,
   q:"**Considerations.** Past failures, brand sensitivities, stakeholder dynamics, sequencing with adjacent campaigns.\n\nWrite 'nothing to flag' if nothing applies. *(Optional — type 'skip' to move on.)*"},

  // ── Section 8 — Key Timings ────────────────────────────
  {id:'timings', sec:'Section 8 — Key Timings', step:8, type:'textarea', key:'timings',
   q:"**Key timings.** Real dates for each milestone:\n\nBrief sign-off · Creative concepts · Stakeholder review · Final artwork · Live date.\n\nList each on its own line with a date."},

  // ── Section 9 — Appendix ───────────────────────────────
  {id:'appendix', sec:'Section 9 — Appendix', step:9, type:'textarea', key:'appendix', optional:true,
   q:"**Appendix.** List supporting materials — brand positioning, audience research, competitor analysis, past campaign data.\n\n*(Optional — type 'skip'.)*"},

  // ── Done ──────────────────────────────────────────────
  {type:'msg', text:"That's the brief done.\n\nClick below to review your completed brief, copy it, or copy a version formatted for the **traffic-manager** audit skill."},
];

/* ── State ─────────────────────────────────────────────── */
const answers = {};
let idx = 0;
let lastSec = null;
const TOTAL = 10;

/* ── Engine ────────────────────────────────────────────── */
function run(i) {
  idx = i;
  if (i >= FLOW.length) { finish(); return; }
  const q = FLOW[i];

  // Conditional skip — audience dimensions only ask if "New audience" was picked
  if (q.conditional === 'new' && answers.persona && !answers.persona.startsWith('New')) {
    run(i + 1);
    return;
  }

  if (q.sec && q.sec !== lastSec) { addDivider(q.sec); lastSec = q.sec; }
  if (q.step !== undefined) setProgress(q.step, q.sec || '');

  const typing = addTyping();
  const delay = q.type === 'msg' ? 500 : 420;

  setTimeout(() => {
    typing.remove();

    if (q.type === 'cascade') {
      const txt = `**Cascade check.**\n\nIf the audience feels *"${esc(answers.obj_att_to || '[attitudinal target]')}"*, will they ${esc(answers.obj_beh || '[behaviour]')}?\n\nIf they do that, does ${esc(answers.obj_metric || '[metric]')} move from ${esc(answers.obj_baseline || '[baseline]')} to ${esc(answers.obj_target || '[target]')} by ${esc(answers.obj_deadline || '[deadline]')}?\n\nDoes the chain hold?`;
      addBot(txt);
      showChoices(['Yes, the chain holds','Let me revise an earlier answer'], val => {
        addUser(val);
        answers.cascade = val;
        if (val.startsWith('Let me')) {
          setTimeout(() => {
            addBot("Noted — flagging this brief as needing a revisit on the cascade. You can edit any answer from the final review screen.\n\nMoving on for now.");
            save();
            setTimeout(() => run(i + 1), 600);
          }, 300);
        } else {
          save();
          setTimeout(() => run(i + 1), 350);
        }
      });
      return;
    }

    addBot(q.text || q.q);

    if (q.type === 'msg') {
      setTimeout(() => run(i + 1), 700);
    } else if (q.type === 'choice') {
      showChoices(q.choices, val => {
        addUser(val);
        answers[q.key] = val;
        // Special handling for persona auto-fill
        if (q.key === 'persona') {
          const slug = personaSlug(val);
          if (slug && PERSONAS[slug]) {
            const p = PERSONAS[slug];
            answers.aud_demo = p.aud_demo;
            answers.aud_belief = p.aud_belief;
            answers.aud_usage = p.aud_usage;
            answers.aud_rel = p.aud_rel;
            save();
            setTimeout(() => {
              addBotConfirm(`Audience pre-filled from **${p.name}** — demographics, beliefs, usage, and relationship-to-brand all loaded.\n\nYou'll be able to refine these in the final review.`);
              setTimeout(() => run(i + 1), 1200);
            }, 350);
            return;
          }
        }
        save();
        hideAll();
        setTimeout(() => run(i + 1), 350);
      });
    } else {
      showInput(q, i);
    }
  }, delay);
}

function personaSlug(label) {
  if (!label) return null;
  const m = label.toLowerCase().match(/^(isaac|madeline|naomi|richard|dominique)/);
  return m ? m[1] : null;
}

function showInput(q, i) {
  hideAll();
  const wrap = document.getElementById('input-wrap');
  const inp = document.getElementById('user-input');
  wrap.style.display = 'flex';
  inp.value = '';
  resize(inp);
  setTimeout(() => inp.focus(), 80);

  const go = () => {
    const val = inp.value.trim();
    if (!val) return;

    if (val.toLowerCase() === 'skip' && q.optional) {
      addUser('Skip');
      answers[q.key] = '';
      save();
      hideAll();
      setTimeout(() => run(i + 1), 350);
      return;
    }

    if (q.validate) {
      const msg = q.validate(val);
      if (msg) {
        addUser(val);
        hideAll();
        showValidation(msg, val, q, i);
        return;
      }
    }

    addUser(val);
    answers[q.key] = val;
    save();
    hideAll();
    setTimeout(() => run(i + 1), 350);
  };

  document.getElementById('send-btn').onclick = go;
  inp.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); } };
}

function showValidation(msg, val, q, i) {
  setTimeout(() => {
    const row = el('div', 'bot-row');
    const wrap = el('div');
    const bubble = el('div', 'bot-bubble warn');
    bubble.innerHTML = fmt(msg);
    const actions = el('div', 'v-actions');

    const revise = el('button', 'v-btn revise');
    revise.textContent = 'Revise answer';
    revise.onclick = () => {
      row.remove();
      showInput(q, i);
      const inp = document.getElementById('user-input');
      inp.value = val; resize(inp);
    };

    const keep = el('button', 'v-btn keep');
    keep.textContent = 'Keep it and move on';
    keep.onclick = () => {
      actions.remove();
      answers[q.key] = val;
      save();
      setTimeout(() => run(i + 1), 350);
    };

    actions.append(revise, keep);
    wrap.append(bubble, actions);
    row.append(makeAvatar(), wrap);
    document.getElementById('chat').appendChild(row);
    scrollEnd();
  }, 450);
}

function showChoices(list, cb) {
  hideAll();
  const wrap = document.getElementById('choices-wrap');
  wrap.style.display = 'flex';
  wrap.innerHTML = '';
  list.forEach(c => {
    const btn = el('button', 'choice');
    btn.textContent = c;
    btn.onclick = () => { wrap.innerHTML = ''; wrap.style.display = 'none'; cb(c); };
    wrap.appendChild(btn);
  });
}

function hideAll() {
  document.getElementById('input-wrap').style.display = 'none';
  const cw = document.getElementById('choices-wrap');
  cw.style.display = 'none'; cw.innerHTML = '';
  document.getElementById('done-btn').style.display = 'none';
}

function finish() {
  setProgress(TOTAL, 'Complete');
  document.getElementById('done-btn').style.display = 'block';
}

/* ── DOM helpers ───────────────────────────────────────── */
function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function makeAvatar() {
  const av = document.createElement('img');
  av.className = 'bot-avatar';
  av.src = '../assets/logo-mark.svg';
  av.alt = 'Bot';
  return av;
}

function addBot(text) {
  const row = el('div', 'bot-row');
  const bubble = el('div', 'bot-bubble');
  bubble.innerHTML = fmt(text);
  row.append(makeAvatar(), bubble);
  document.getElementById('chat').appendChild(row);
  scrollEnd();
}

function addBotConfirm(text) {
  const row = el('div', 'bot-row');
  const bubble = el('div', 'bot-bubble confirm');
  bubble.innerHTML = fmt(text);
  row.append(makeAvatar(), bubble);
  document.getElementById('chat').appendChild(row);
  scrollEnd();
}

function addUser(text) {
  const row = el('div', 'user-row');
  const bubble = el('div', 'user-bubble');
  bubble.textContent = text;
  row.appendChild(bubble);
  document.getElementById('chat').appendChild(row);
  scrollEnd();
}

function addDivider(label) {
  const d = el('div', 'divider');
  d.innerHTML = `<div class="divider-line"></div><div class="divider-label">${esc(label)}</div><div class="divider-line"></div>`;
  document.getElementById('chat').appendChild(d);
}

function addTyping() {
  const row = el('div', 'bot-row');
  const bubble = el('div', 'bot-bubble');
  bubble.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  row.append(makeAvatar(), bubble);
  document.getElementById('chat').appendChild(row);
  scrollEnd();
  return row;
}

function fmt(text) {
  return (text || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function scrollEnd() { setTimeout(() => { const c = document.getElementById('chat'); c.scrollTop = c.scrollHeight; }, 60); }

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
document.getElementById('user-input').addEventListener('input', function(){ resize(this); });

/* ── Progress ──────────────────────────────────────────── */
function setProgress(step, name) {
  const pct = Math.round((step / TOTAL) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('step-name').textContent = name || 'Getting started';
}

/* ── Storage ───────────────────────────────────────────── */
function save() { try { localStorage.setItem('bb_v2', JSON.stringify(answers)); } catch(e){} }

/* ── Brief render ──────────────────────────────────────── */
function showBrief() {
  const a = answers;
  const smart = (a.obj_metric || a.obj_baseline || a.obj_target || a.obj_deadline)
    ? `Grow ${a.obj_metric || '[metric]'} from ${a.obj_baseline || '[baseline]'} to ${a.obj_target || '[target]'} by ${a.obj_deadline || '[deadline]'}.`
    : '';

  const att = (a.obj_att_from || a.obj_att_to)
    ? `From: ${a.obj_att_from || '[…]'}\n→ To: ${a.obj_att_to || '[…]'}`
    : '';

  // Auto-run traffic-manager audit
  const findings = window.BriefAudit ? window.BriefAudit.auditBrief(a) : [];
  const auditHTML = window.BriefAudit
    ? `<div class="bs">
         <div class="bs-title">Traffic-Manager Audit</div>
         ${window.BriefAudit.renderAuditHTML(findings)}
       </div>`
    : '';

  const html = auditHTML + `
    <div class="bs">
      <div class="bs-title">Project Details</div>
      <div class="hgrid">
        ${bf('Project name', a.project_name)}
        ${bf('Segment', a.segment)}
        ${bf('Creative lead', a.creative_lead)}
        ${bf('Brief approver', a.approver)}
        ${bf('Launch date', a.launch)}
        ${bf('Media budget', a.budget_media)}
        ${bf('Brief tier', 'GOLD')}
      </div>
    </div>
    <div class="bs">
      <div class="bs-title">Section 1 — Context</div>
      ${bf('Commercial trigger', a.reason)}
      ${bf('Problem or opportunity', a.prob_opp)}
      ${bf('Key focus', a.focus)}
    </div>
    <div class="bs">
      <div class="bs-title">Section 2 — Objectives</div>
      ${bf('Commercial objective (SMART)', smart)}
      ${bf('Behavioural objective', a.obj_beh)}
      ${bf('Attitudinal shift', att)}
      ${a.cascade ? bf('Cascade check', a.cascade) : ''}
    </div>
    <div class="bs">
      <div class="bs-title">Section 3 — Audience</div>
      ${a.persona ? bf('Persona', a.persona) : ''}
      ${bf('Demographics', a.aud_demo)}
      ${bf('What they believe', a.aud_belief)}
      ${bf('Usage', a.aud_usage)}
      ${bf('Relationship to brand + competitors', a.aud_rel)}
    </div>
    <div class="bs">
      <div class="bs-title">Section 4 — Insight + Message</div>
      ${bf('The insight', a.insight)}
      ${bf('Barrier', a.barrier)}
      ${bf('Lever', a.lever)}
      ${bf('Behavioural principle / nudge', a.nudge)}
      ${bf('Single-minded message', a.message)}
      ${bf('RTB #1 (hard fact)', a.rtb1)}
      ${a.rtb2 ? bf('RTB #2 (customer evidence)', a.rtb2) : ''}
      ${a.rtb3 ? bf('RTB #3 (brand claim)', a.rtb3) : ''}
    </div>
    <div class="bs">
      <div class="bs-title">Section 5 — Creative Guidance</div>
      ${bf('Emotional state to produce', a.feel)}
      ${bf('Must never do', a.never)}
      ${a.inspo ? bf('Reference / inspiration', a.inspo) : ''}
    </div>
    <div class="bs">
      <div class="bs-title">Section 6 — Deliverables</div>
      ${bf('Deliverables', a.deliverables)}
    </div>
    ${a.cons ? `<div class="bs"><div class="bs-title">Section 7 — Considerations</div>${bf('Considerations', a.cons)}</div>` : ''}
    <div class="bs">
      <div class="bs-title">Section 8 — Key Timings</div>
      ${bf('Timings', a.timings)}
    </div>
    ${a.appendix ? `<div class="bs"><div class="bs-title">Section 9 — Appendix</div>${bf('Supporting materials', a.appendix)}</div>` : ''}
  `;
  document.getElementById('brief-body').innerHTML = html;
  document.getElementById('overlay').classList.add('on');
}

function bf(label, value) {
  if (!value) return '';
  return `<div class="bf"><div class="bf-label">${esc(label)}</div><div class="bf-val">${esc(value).replace(/\n/g,'<br>')}</div></div>`;
}

function buildPlainText() {
  const a = answers;
  const smart = (a.obj_metric || a.obj_baseline || a.obj_target || a.obj_deadline)
    ? `Grow ${a.obj_metric || '[metric]'} from ${a.obj_baseline || '[baseline]'} to ${a.obj_target || '[target]'} by ${a.obj_deadline || '[deadline]'}.`
    : '';
  const att = (a.obj_att_from || a.obj_att_to)
    ? `From: ${a.obj_att_from || '[…]'}\nTo: ${a.obj_att_to || '[…]'}`
    : '';
  const line = s => `${s}\n${'─'.repeat(46)}`;
  const f = (l, v) => v ? `${l}:\n${v}\n` : '';
  return [
    'BETASHARES — GOLD TIER MARKETING BRIEF', '═'.repeat(46), '',
    'PROJECT DETAILS',
    f('Project', a.project_name), f('Segment', a.segment), f('Creative lead', a.creative_lead),
    f('Brief approver', a.approver), f('Launch date', a.launch), f('Media budget', a.budget_media),
    'Brief tier: GOLD\n',
    line('SECTION 1 — CONTEXT'),
    f('Commercial trigger', a.reason), f('Problem or opportunity', a.prob_opp), f('Key focus', a.focus),
    line('SECTION 2 — OBJECTIVES'),
    f('Commercial objective (SMART)', smart),
    f('Behavioural objective', a.obj_beh),
    f('Attitudinal shift', att),
    a.cascade ? f('Cascade check', a.cascade) : '',
    line('SECTION 3 — AUDIENCE'),
    a.persona ? f('Persona', a.persona) : '',
    f('Demographics', a.aud_demo), f('What they believe', a.aud_belief),
    f('Usage', a.aud_usage), f('Relationship to brand + competitors', a.aud_rel),
    line('SECTION 4 — INSIGHT + MESSAGE'),
    f('The insight', a.insight), f('Barrier', a.barrier), f('Lever', a.lever),
    f('Behavioural principle / nudge', a.nudge),
    f('Single-minded message', a.message),
    f('RTB #1 (hard fact)', a.rtb1), f('RTB #2 (customer evidence)', a.rtb2), f('RTB #3 (brand claim)', a.rtb3),
    line('SECTION 5 — CREATIVE GUIDANCE'),
    f('Emotional state to produce', a.feel), f('Must never do', a.never), f('Reference / inspiration', a.inspo),
    line('SECTION 6 — DELIVERABLES'),
    f('Deliverables', a.deliverables),
    a.cons ? line('SECTION 7 — CONSIDERATIONS') + '\n' + f('Considerations', a.cons) : '',
    line('SECTION 8 — KEY TIMINGS'), f('Timings', a.timings),
    a.appendix ? line('SECTION 9 — APPENDIX') + '\n' + f('Supporting materials', a.appendix) : '',
  ].filter(Boolean).join('\n');
}

function copyBrief() {
  navigator.clipboard.writeText(buildPlainText()).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = 'Copy text', 2000);
  });
}

function copyForHandoff() {
  const prompt = `Review this Gold Tier brief in two passes — use the traffic-manager and marketing-specialist skills if available.\n\nPASS 1 — GAPS (traffic-manager).\nSection by section, flag blockers (❌) and should-fixes (⚠️) as questions for the marketing specialist to answer. What's missing or unclear?\n\nPASS 2 — IMPROVEMENTS (marketing-specialist, coach mode).\nFor each section that IS written, suggest specific improvements — sharper phrasings, stronger evidence, tighter messages, sharper audience, more single-minded language. What could be better in what's already there?\n\nOutput the gaps pass first (red/amber/green report), then the improvements pass (section-by-section suggestions). Be direct, evidence-led, no padding.`;
  const text = `${prompt}\n\n${'─'.repeat(46)}\n\n${buildPlainText()}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('handoff-btn');
    btn.textContent = '✓ Copied — paste to Claude';
    setTimeout(() => btn.textContent = 'Copy for AI review', 2500);
  });
}

function closeOverlay() { document.getElementById('overlay').classList.remove('on'); }

function restart() {
  if (!confirm('Start over? Your answers will be lost.')) return;
  try { localStorage.removeItem('bb_v2'); } catch(e){}
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById('chat').innerHTML = '';
  lastSec = null; idx = 0;
  document.getElementById('overlay').classList.remove('on');
  setProgress(0, 'Getting started');
  run(0);
}

/* ── Start ─────────────────────────────────────────────── */
run(0);
</script>
